name: xR Bot

on:
  schedule:
    # Every 15 minutes from 6 PM to 1 AM ET (22:00-05:00 UTC)
    # During baseball season (April-October)
    - cron: '*/15 19-23,0-6 * 4-10 *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run xR bot
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python main.py

      - name: Commit updated state and site
        run: |
          git config user.name "xR Bot"
          git config user.email "xrbot@users.noreply.github.com"
          git add data/posted_games.json data/scores.json docs/index.html
          git diff --staged --quiet || git commit -m "Update xR scores [skip ci]"
          git push
