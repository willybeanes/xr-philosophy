name: Cleanup and Repost

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Delete all Bluesky posts
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python delete_posts.py

      - name: Run xR bot (re-post)
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "xR Bot"
          git config user.email "xrbot@users.noreply.github.com"
          git add data/posted_games.json data/scores.json docs/index.html
          git diff --staged --quiet || git commit -m "Cleanup and repost [skip ci]"
          git push
